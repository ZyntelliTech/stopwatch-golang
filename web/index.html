<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stopwatch Realtime Monitor</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .card {
      width: min(960px, 96vw);
      background: #111827;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      color: #93c5fd;
    }
    .status {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 16px;
    }
    .widgets {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }
    .widget {
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px;
      background: #0b1220;
    }
    .widgetHead {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .widgetTitle {
      font-size: 14px;
      color: #cbd5e1;
    }
    .watch {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 1px;
      margin: 10px 0 8px;
      color: #22d3ee;
    }
    .meta {
      font-size: 12px;
      color: #94a3b8;
      display: grid;
      gap: 4px;
    }
    .healthBlock {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #1e293b;
      font-size: 12px;
      color: #94a3b8;
      display: grid;
      gap: 4px;
    }
    .healthBlock h3 {
      margin: 0 0 4px;
      font-size: 12px;
      font-weight: 600;
      color: #a5b4fc;
    }
    .healthRaw {
      margin: 6px 0 0;
      padding: 8px;
      background: #020617;
      border: 1px solid #334155;
      border-radius: 6px;
      font-size: 11px;
      color: #cbd5e1;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 120px;
      overflow: auto;
    }
    .actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    button {
      background: #2563eb;
      border: none;
      color: white;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .mono {
      font-family: Consolas, Monaco, monospace;
    }
    .widgetStatus {
      font-size: 12px;
      color: #94a3b8;
      min-height: 16px;
    }
    .subtle {
      color: #94a3b8;
      font-size: 12px;
    }
    .manualAdd {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .manualAdd input {
      background: #0b1220;
      border: 1px solid #334155;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 10px 12px;
      min-width: 240px;
    }
    .configRow {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .configRow input[type="number"] {
      background: #0b1220;
      border: 1px solid #334155;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 8px 10px;
      width: 72px;
    }
    .configRow select {
      background: #0b1220;
      border: 1px solid #334155;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 8px 10px;
    }
    .configRow label {
      font-size: 12px;
    }
    button[data-role="removeBtn"] {
      background: #475569;
      font-size: 12px;
      padding: 6px 10px;
    }
    .manualMsg {
      font-size: 12px;
      color: #94a3b8;
    }
    .broadcastPanel {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid #334155;
      border-radius: 10px;
      background: #0b1220;
      display: grid;
      gap: 8px;
    }
    .broadcastGrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 8px;
      align-items: center;
    }
    .broadcastGrid input,
    .broadcastGrid select {
      background: #0b1220;
      border: 1px solid #334155;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 8px 10px;
      min-width: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Stopwatch Realtime</h1>
    <div id="status" class="status">Connecting...</div>
    <div class="manualAdd">
      <input id="manualDeviceId" class="mono" type="text" placeholder="Enter device_id (e.g. FAKE:01)" />
      <button id="addWatchBtn">Add Watch</button>
      <span id="manualAddMsg" class="manualMsg"></span>
    </div>
    <div class="broadcastPanel">
      <div><strong>Broadcast race state</strong> <span class="mono">brain/race/state</span></div>
      <div class="broadcastGrid">
        <input id="raceEidInput" type="number" step="1" value="1" placeholder="eid" />
        <input id="raceNameInput" type="text" value="100 Free" placeholder="name" />
        <input id="raceHeatInput" type="number" step="1" value="1" placeholder="heat" />
        <select id="raceActionInput">
          <option value="0" selected>0 (next_heat)</option>
          <option value="1">1 (next_event)</option>
          <option value="2">2 (meet_started)</option>
        </select>
      </div>
      <div class="configRow" style="margin-top: 0">
        <button id="publishRaceStateBtn" type="button">Publish race state</button>
        <span id="raceBroadcastStatus" class="widgetStatus"></span>
      </div>
    </div>
    <div class="subtle">Widgets appear when a device sends stopwatch data or heartbeat on MQTT (e.g. <span class="mono">stopwatch/+/health</span>).</div>
    <div id="widgets" class="widgets"></div>
  </div>

  <script>
    const HEARTBEAT_STALE_MS = 70 * 1000;
    const HEARTBEAT_SWEEP_MS = 5 * 1000;

    const statusEl = document.getElementById("status");
    const manualDeviceIdEl = document.getElementById("manualDeviceId");
    const addWatchBtn = document.getElementById("addWatchBtn");
    const manualAddMsgEl = document.getElementById("manualAddMsg");
    const raceEidInput = document.getElementById("raceEidInput");
    const raceNameInput = document.getElementById("raceNameInput");
    const raceHeatInput = document.getElementById("raceHeatInput");
    const raceActionInput = document.getElementById("raceActionInput");
    const publishRaceStateBtn = document.getElementById("publishRaceStateBtn");
    const raceBroadcastStatus = document.getElementById("raceBroadcastStatus");
    const widgetsEl = document.getElementById("widgets");
    const widgetsByDeviceId = new Map();
    /** Superseded id -> canonical id (after config ACK rename). Keeps MQTT events on old id from spawning a second card. */
    const deviceIdAlias = new Map();

    function resolveCanonicalDeviceId(raw) {
      let id = (raw || "").trim();
      if (!id) {
        return "";
      }
      const seen = new Set();
      while (deviceIdAlias.has(id)) {
        if (seen.has(id)) {
          break;
        }
        seen.add(id);
        id = deviceIdAlias.get(id);
      }
      return id;
    }

    function formatStatus(status) {
      const s = (status || "").trim().toLowerCase();
      if (s === "start") return "Running";
      if (s === "stop") return "Stopped";
      if (s === "reset") return "Ready";
      return "Unknown";
    }

    /** Format milliseconds as HH:MM:SS.hh (hundredths of second), same as server. */
    function formatMsToWatch(ms) {
      let n = Number(ms);
      if (!Number.isFinite(n) || n < 0) {
        n = 0;
      }
      n = Math.floor(n);
      const h = Math.floor(n / 3600000);
      n %= 3600000;
      const m = Math.floor(n / 60000);
      n %= 60000;
      const s = Math.floor(n / 1000);
      let frac = Math.floor((n % 1000) / 10);
      if (frac > 99) {
        frac = 99;
      }
      const pad = (v, w) => String(v).padStart(w, "0");
      return `${pad(h, 2)}:${pad(m, 2)}:${pad(s, 2)}.${pad(frac, 2)}`;
    }

    function createWidget(deviceId) {
      const root = document.createElement("div");
      root.className = "widget";

      root.innerHTML = `
        <div class="widgetHead">
          <div class="widgetTitle">Device <span class="mono" data-role="topicDeviceId">${deviceId}</span></div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
            <div class="widgetStatus" data-role="state">Waiting...</div>
            <button type="button" data-role="removeBtn" title="Remove this device card">Remove</button>
          </div>
        </div>
        <div class="meta subtle" data-role="friendlyNameRow">Name: <span class="mono" data-role="friendlyName">Unpaired Device</span></div>
        <div class="watch mono" data-role="watch">00:00:00.00</div>
        <div class="meta">
          <div>Data topic: <span class="mono" data-role="topic">-</span></div>
          <div>Data updated: <span class="mono" data-role="updated">-</span></div>
        </div>
        <div class="healthBlock" data-role="timeBlock" style="display:none">
          <h3>Device time (MQTT)</h3>
          <div>Time topic: <span class="mono" data-role="timeTopic">-</span></div>
          <div>time (ms): <span class="mono" data-role="timeMs">-</span></div>
          <div>type / mid / eid / heat: <span class="mono" data-role="timeFields">-</span></div>
          <pre class="healthRaw mono" data-role="timeRaw"></pre>
        </div>
        <div class="healthBlock" data-role="healthBlock">
          <h3>Heartbeat</h3>
          <div>Battery: <span class="mono" data-role="bat">-</span></div>
          <div>RSSI: <span class="mono" data-role="rssi">-</span> dBm</div>
          <div>Status: <span class="mono" data-role="healthStatus">-</span></div>
          <div>Health topic: <span class="mono" data-role="healthTopic">-</span></div>
          <div>Heartbeat at: <span class="mono" data-role="hbUpdated">-</span></div>
          <pre class="healthRaw mono" data-role="healthRaw"></pre>
        </div>
        <div class="actions">
          <button data-role="startBtn">Start</button>
          <button data-role="stopBtn">Stop</button>
          <button data-role="resetBtn">Reset</button>
          <span class="widgetStatus" data-role="actionStatus"></span>
        </div>
        <div class="configRow">
          <label>Lane #</label>
          <input type="number" min="0" step="1" value="3" data-role="laneInput" />
          <label>Watch #</label>
          <input type="number" min="0" step="1" value="2" data-role="watchInput" />
          <label>Role</label>
          <select data-role="roleInput">
            <option value="0" selected>0 (lane_timer)</option>
            <option value="1">1 (head_timer)</option>
          </select>
          <button type="button" data-role="configBtn">Send config</button>
        </div>
      `;

      const refs = {
        root,
        deviceId,
        createdAtMs: Date.now(),
        lastHeartbeatAtMs: null,
        serverRunning: false,
        watchEl: root.querySelector('[data-role="watch"]'),
        topicEl: root.querySelector('[data-role="topic"]'),
        updatedEl: root.querySelector('[data-role="updated"]'),
        stateEl: root.querySelector('[data-role="state"]'),
        timeBlockEl: root.querySelector('[data-role="timeBlock"]'),
        timeTopicEl: root.querySelector('[data-role="timeTopic"]'),
        timeMsEl: root.querySelector('[data-role="timeMs"]'),
        timeFieldsEl: root.querySelector('[data-role="timeFields"]'),
        timeRawEl: root.querySelector('[data-role="timeRaw"]'),
        friendlyNameRowEl: root.querySelector('[data-role="friendlyNameRow"]'),
        friendlyNameEl: root.querySelector('[data-role="friendlyName"]'),
        batEl: root.querySelector('[data-role="bat"]'),
        rssiEl: root.querySelector('[data-role="rssi"]'),
        healthStatusEl: root.querySelector('[data-role="healthStatus"]'),
        healthTopicEl: root.querySelector('[data-role="healthTopic"]'),
        hbUpdatedEl: root.querySelector('[data-role="hbUpdated"]'),
        healthRawEl: root.querySelector('[data-role="healthRaw"]'),
        actionStatusEl: root.querySelector('[data-role="actionStatus"]'),
        startBtn: root.querySelector('[data-role="startBtn"]'),
        stopBtn: root.querySelector('[data-role="stopBtn"]'),
        resetBtn: root.querySelector('[data-role="resetBtn"]'),
        laneInput: root.querySelector('[data-role="laneInput"]'),
        watchInput: root.querySelector('[data-role="watchInput"]'),
        roleInput: root.querySelector('[data-role="roleInput"]'),
        configBtn: root.querySelector('[data-role="configBtn"]'),
        removeBtn: root.querySelector('[data-role="removeBtn"]'),
      };

      refs.removeBtn.addEventListener("click", () => removeDeviceWidget(refs));
      refs.startBtn.addEventListener("click", () => sendCommand(refs, "start"));
      refs.stopBtn.addEventListener("click", () => sendCommand(refs, "stop"));
      refs.resetBtn.addEventListener("click", () => sendCommand(refs, "reset"));
      refs.configBtn.addEventListener("click", () => sendDeviceConfig(refs));

      widgetsEl.appendChild(root);
      widgetsByDeviceId.set(deviceId, refs);
      return refs;
    }

    function getOrCreateWidget(deviceId) {
      const canonical = resolveCanonicalDeviceId(deviceId);
      if (!canonical) {
        return null;
      }
      const existing = widgetsByDeviceId.get(canonical);
      if (existing) {
        return existing;
      }
      return createWidget(canonical);
    }

    function getExistingWidget(deviceId) {
      const canonical = resolveCanonicalDeviceId(deviceId);
      if (!canonical) {
        return null;
      }
      return widgetsByDeviceId.get(canonical) || null;
    }

    function addWatchManually() {
      const raw = manualDeviceIdEl.value || "";
      const deviceId = raw.trim();
      if (!deviceId) {
        manualAddMsgEl.textContent = "Please enter a device_id";
        return;
      }
      const canonical = resolveCanonicalDeviceId(deviceId);
      const existed = widgetsByDeviceId.has(canonical);
      getOrCreateWidget(deviceId);
      if (existed) {
        manualAddMsgEl.textContent = `Watch ${deviceId} already exists`;
      } else {
        manualAddMsgEl.textContent = `Watch ${deviceId} added`;
      }
      manualDeviceIdEl.value = "";
      manualDeviceIdEl.focus();
    }

    function setWidgetButtonsDisabled(refs, disabled) {
      refs.startBtn.disabled = disabled;
      refs.stopBtn.disabled = disabled;
      refs.resetBtn.disabled = disabled;
      refs.configBtn.disabled = disabled;
    }

    /**
     * Merge dashboard state when device_id changes (config ack or SSE from server).
     * If both old and new widgets exist, removes the old card and keeps the new one.
     */
    function applyDeviceRenamed(previousId, newId) {
      if (!previousId || !newId || previousId === newId) {
        return;
      }
      deviceIdAlias.set(previousId, newId);
      for (const [k, v] of [...deviceIdAlias.entries()]) {
        if (v === previousId) {
          deviceIdAlias.set(k, newId);
        }
      }
      const refsOld = widgetsByDeviceId.get(previousId);
      const refsNew = widgetsByDeviceId.get(newId);
      if (refsOld && refsNew && refsOld !== refsNew) {
        refsOld.root.remove();
        widgetsByDeviceId.delete(previousId);
        return;
      }
      if (refsOld && !refsNew) {
        widgetsByDeviceId.delete(previousId);
        refsOld.deviceId = newId;
        widgetsByDeviceId.set(newId, refsOld);
        const idEl = refsOld.root.querySelector('[data-role="topicDeviceId"]');
        if (idEl) {
          idEl.textContent = newId;
        }
      }
    }

    function renameDeviceWidget(refs, newId) {
      applyDeviceRenamed(refs.deviceId, newId);
    }

    function removeDeviceWidget(refs) {
      const id = refs.deviceId;
      widgetsByDeviceId.delete(id);
      deviceIdAlias.delete(id);
      for (const [k, v] of [...deviceIdAlias.entries()]) {
        if (k === id || v === id) {
          deviceIdAlias.delete(k);
        }
      }
      refs.root.remove();
    }

    function sweepStaleHeartbeatWidgets() {
      const now = Date.now();
      for (const refs of [...widgetsByDeviceId.values()]) {
        const lastHb = refs.lastHeartbeatAtMs;
        if (lastHb === null || lastHb === undefined) {
          if (now - refs.createdAtMs > HEARTBEAT_STALE_MS) {
            removeDeviceWidget(refs);
          }
          continue;
        }
        if (now - lastHb > HEARTBEAT_STALE_MS) {
          removeDeviceWidget(refs);
        }
      }
    }

    const stream = new EventSource("/api/mqtt/stream");

    stream.addEventListener("ready", () => {
      statusEl.textContent = "Connected. Waiting for stopwatch data...";
    });

    stream.addEventListener("device_rename", (evt) => {
      try {
        const msg = JSON.parse(evt.data);
        const prev = (msg.previous_device_id || "").trim();
        const next = (msg.device_id || "").trim();
        applyDeviceRenamed(prev, next);
        statusEl.textContent = "Live stream connected";
      } catch (err) {
        statusEl.textContent = "Received malformed device_rename payload";
      }
    });

    function applyHeartbeatToWidget(refs, msg) {
      refs.lastHeartbeatAtMs = Date.now();
      if (msg.id) {
        refs.friendlyNameRowEl.style.display = "";
        refs.friendlyNameEl.textContent = msg.id;
      } else {
        refs.friendlyNameRowEl.style.display = "";
        refs.friendlyNameEl.textContent = "Unpaired Device";
      }
      refs.batEl.textContent =
        msg.bat !== undefined && msg.bat !== null ? String(msg.bat) : "-";
      refs.rssiEl.textContent =
        msg.rssi !== undefined && msg.rssi !== null ? String(msg.rssi) : "-";
      refs.healthStatusEl.textContent = msg.status ? String(msg.status) : "-";
      refs.healthTopicEl.textContent = msg.topic || "-";
      if (msg.received_at) {
        const d = new Date(msg.received_at);
        refs.hbUpdatedEl.textContent = d.toLocaleString();
      } else {
        refs.hbUpdatedEl.textContent = "-";
      }
      if (msg.payload && typeof msg.payload === "object") {
        refs.healthRawEl.textContent = JSON.stringify(msg.payload, null, 2);
      } else {
        refs.healthRawEl.textContent = "";
      }
    }

    stream.addEventListener("server_tick", (evt) => {
      try {
        const msg = JSON.parse(evt.data);
        const deviceId = (msg.device_id || "").trim();
        if (!deviceId) {
          return;
        }
        // Only show devices that are already known by heartbeat.
        const refs = getExistingWidget(deviceId);
        if (!refs) {
          return;
        }
        refs.serverRunning = true;
        refs.watchEl.textContent =
          msg.elapsed_ms !== undefined && msg.elapsed_ms !== null
            ? formatMsToWatch(msg.elapsed_ms)
            : msg.display || "00:00:00.00";
        refs.stateEl.textContent = "Running (server)";
        refs.topicEl.textContent = "—";
        refs.updatedEl.textContent = "-";
        statusEl.textContent = "Live stream connected";
      } catch (err) {
        statusEl.textContent = "Received malformed server_tick payload";
      }
    });

    stream.addEventListener("timing", (evt) => {
      try {
        const msg = JSON.parse(evt.data);
        const deviceId = (msg.device_id || "").trim();
        if (!deviceId) {
          return;
        }
        // Only show devices that are already known by heartbeat.
        const refs = getExistingWidget(deviceId);
        if (!refs) {
          return;
        }
        refs.serverRunning = false;
        refs.watchEl.textContent =
          msg.time_ms !== undefined && msg.time_ms !== null
            ? formatMsToWatch(msg.time_ms)
            : msg.display || "00:00:00.00";
        refs.stateEl.textContent = "Stopped (device)";
        refs.topicEl.textContent = msg.topic || "-";
        if (msg.received_at) {
          const d = new Date(msg.received_at);
          refs.updatedEl.textContent = d.toLocaleTimeString();
        } else {
          refs.updatedEl.textContent = "-";
        }
        refs.timeBlockEl.style.display = "";
        refs.timeTopicEl.textContent = msg.topic || "-";
        refs.timeMsEl.textContent =
          msg.time_ms !== undefined && msg.time_ms !== null ? String(msg.time_ms) : "-";
        const parts = [
          msg.type !== undefined && msg.type !== null ? `type=${msg.type}` : null,
          msg.mid !== undefined && msg.mid !== null ? `mid=${msg.mid}` : null,
          msg.eid !== undefined && msg.eid !== null ? `eid=${msg.eid}` : null,
          msg.heat !== undefined && msg.heat !== null ? `heat=${msg.heat}` : null,
        ].filter(Boolean);
        refs.timeFieldsEl.textContent = parts.length ? parts.join(", ") : "-";
        if (msg.payload && typeof msg.payload === "object") {
          refs.timeRawEl.textContent = JSON.stringify(msg.payload, null, 2);
        } else {
          refs.timeRawEl.textContent = "";
        }
        if (msg.id) {
          refs.friendlyNameRowEl.style.display = "";
          refs.friendlyNameEl.textContent = msg.id;
        } else {
          refs.friendlyNameRowEl.style.display = "";
          refs.friendlyNameEl.textContent = "Unpaired Device";
        }
        statusEl.textContent = "Live stream connected";
      } catch (err) {
        statusEl.textContent = "Received malformed timing payload";
      }
    });

    stream.addEventListener("stopwatch", (evt) => {
      try {
        const msg = JSON.parse(evt.data);
        const deviceId = (msg.device_id || "").trim();
        if (!deviceId) {
          return;
        }
        // Only show devices that are already known by heartbeat.
        const refs = getExistingWidget(deviceId);
        if (!refs) {
          return;
        }
        if (refs.serverRunning) {
          return;
        }
        refs.watchEl.textContent =
          msg.time_ms !== undefined && msg.time_ms !== null
            ? formatMsToWatch(msg.time_ms)
            : msg.data || "00:00:00.00";
        refs.topicEl.textContent = msg.topic || "-";
        refs.stateEl.textContent = formatStatus(msg.status);

        if (msg.received_at) {
          const d = new Date(msg.received_at);
          refs.updatedEl.textContent = d.toLocaleTimeString();
        } else {
          refs.updatedEl.textContent = "-";
        }

        statusEl.textContent = "Live stream connected";
      } catch (err) {
        statusEl.textContent = "Received malformed event payload";
      }
    });

    stream.addEventListener("heartbeat", (evt) => {
      try {
        const msg = JSON.parse(evt.data);
        const deviceId = (msg.device_id || "").trim();
        if (!deviceId) {
          return;
        }
        const refs = getOrCreateWidget(deviceId);
        if (!refs) {
          return;
        }
        applyHeartbeatToWidget(refs, msg);
        statusEl.textContent = "Live stream connected";
      } catch (err) {
        statusEl.textContent = "Received malformed heartbeat payload";
      }
    });

    stream.onerror = () => {
      statusEl.textContent = "Disconnected. Retrying stream...";
      for (const refs of widgetsByDeviceId.values()) {
        setWidgetButtonsDisabled(refs, true);
      }
    };

    setInterval(sweepStaleHeartbeatWidgets, HEARTBEAT_SWEEP_MS);

    async function sendRaceStateBroadcast() {
      const eid = parseInt((raceEidInput.value || "").trim(), 10);
      const heat = parseInt((raceHeatInput.value || "").trim(), 10);
      const action = parseInt((raceActionInput.value || "").trim(), 10);
      const name = (raceNameInput.value || "").trim();
      if (!Number.isFinite(eid) || !Number.isFinite(heat) || !Number.isFinite(action) || !name) {
        raceBroadcastStatus.textContent = "Publish failed: eid/name/heat/action required";
        return;
      }
      if (action < 0 || action > 2) {
        raceBroadcastStatus.textContent = "Publish failed: action must be 0, 1, or 2";
        return;
      }

      publishRaceStateBtn.disabled = true;
      raceBroadcastStatus.textContent = "Publishing...";
      try {
        const res = await fetch("/api/mqtt/broadcast/race-state", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ eid, name, heat, action }),
        });
        if (!res.ok) {
          const text = await res.text();
          raceBroadcastStatus.textContent = `Publish failed: ${text || res.status}`;
          return;
        }
        raceBroadcastStatus.textContent = "Race state published";
      } catch (err) {
        raceBroadcastStatus.textContent = "Publish failed: network error";
      } finally {
        publishRaceStateBtn.disabled = false;
      }
    }

    function buildConfigPayload(refs) {
      const laneRaw = refs.laneInput.value.trim();
      const watchRaw = refs.watchInput.value.trim();
      const roleRaw = refs.roleInput.value.trim();
      if (laneRaw === "" || watchRaw === "" || roleRaw === "") {
        return null;
      }
      const lane = parseInt(laneRaw, 10);
      const watch = parseInt(watchRaw, 10);
      const role = parseInt(roleRaw, 10);
      if (!Number.isFinite(lane) || !Number.isFinite(watch) || !Number.isFinite(role)) {
        return null;
      }
      if (role !== 0 && role !== 1) {
        return null;
      }
      return JSON.stringify({ lane, watch, role });
    }

    async function sendDeviceConfig(refs) {
      const payload = buildConfigPayload(refs);
      if (payload === null) {
        refs.actionStatusEl.textContent =
          "Config failed: enter valid lane/watch and role (0 or 1)";
        return;
      }
      const deviceId = refs.deviceId;
      setWidgetButtonsDisabled(refs, true);
      refs.actionStatusEl.textContent = "Sending config...";
      try {
        const res = await fetch(
          `/api/mqtt/devices/${encodeURIComponent(deviceId)}/config`,
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: payload,
          }
        );
        if (!res.ok) {
          const text = await res.text();
          refs.actionStatusEl.textContent = `Config failed: ${text || res.status}`;
          return;
        }
        refs.actionStatusEl.textContent = "Config sent";
      } catch (err) {
        refs.actionStatusEl.textContent = "Config failed: network error";
      } finally {
        setWidgetButtonsDisabled(refs, false);
      }
    }

    async function sendCommand(refs, command) {
      const deviceId = refs.deviceId;
      const display = command.charAt(0).toUpperCase() + command.slice(1);
      setWidgetButtonsDisabled(refs, true);
      refs.actionStatusEl.textContent = `Sending ${display}...`;
      try {
        const res = await fetch(
          `/api/mqtt/devices/${encodeURIComponent(deviceId)}/${command}`,
          { method: "POST" }
        );
        if (!res.ok) {
          const text = await res.text();
          refs.actionStatusEl.textContent = `${display} failed: ${text || res.status}`;
          return;
        }
        refs.actionStatusEl.textContent = `${display} sent`;
      } catch (err) {
        refs.actionStatusEl.textContent = `${display} failed: network error`;
      } finally {
        setWidgetButtonsDisabled(refs, false);
      }
    }

    addWatchBtn.addEventListener("click", addWatchManually);
    publishRaceStateBtn.addEventListener("click", sendRaceStateBroadcast);
    manualDeviceIdEl.addEventListener("keydown", (evt) => {
      if (evt.key === "Enter") {
        evt.preventDefault();
        addWatchManually();
      }
    });
  </script>
</body>
</html>
